  other: The 1st Line of Defense

explainerText:
  other: |
    The **OWASP® CRS** is a set of generic attack detection rules for use with 
    [ModSecurity](https://www.modsecurity.org/) or compatible web application firewalls. 
    The CRS aims to protect web applications from a wide range of attacks, 
    including the OWASP Top Ten, with a minimum of false alerts. 
    The CRS provides protection against many common attack categories.

explainerButton:
  other: About

ltsBannerTitle:
  other: "CRS 4.25.0 LTS — First Long-Term Support Release"

ltsBannerText:
  other: |
    **CRS 4.25.0** is the first **Long-Term Support** release for the CRS 4 line.
    This release focuses on stability: completing the migration to
    [regex-assembly](https://github.com/coreruleset/coreruleset/issues/4480),
    small improvements, and false positive fixes.
    Organizations running CRS 3.3 should plan their migration now — CRS 3.3.x support ends Q3 2026.

